<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply saved theme before paint to avoid a flash of the wrong theme.
         Default is LIGHT — dark only when the user explicitly chose it. The key
         was renamed to 'ecomify-theme' so any previously saved 'dark' preference
         is ignored, resetting everyone to the light default once. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('ecomify-theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
           <link rel="icon" type="image/png" href="/logo.png" />


        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecomify</title>

    <!-- Google Identity Services (Sign in with Google). Provides window.google. -->
    <script src="https://accounts.google.com/gsi/client" async></script>
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
